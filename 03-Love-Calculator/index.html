<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initail-scale=1.0">
    <title>Love Calculator </title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="container">
        <h1 id="tile"> Love Calculator </h1>
          <label for="you">Enter Your Name : </label>
        <input id="you" name="you" type="text">
        <label for="lover">Enter Your Lover Name : </label>
        <input id="lover" name="lover" type="text">
        <button id="btn">Calculate Love</button>
        <p>Love Result:  <progress id="result" value="0" max="100"></progress> <span id="value"></span></p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
